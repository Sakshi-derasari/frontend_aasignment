<!DOCTYPE html>
<html>
<head>
<title>College Management System</title>
<style>
table{
    border-collapse: collapse;
    
    width: 60%;
    text-align: center;
}
th, td{
    border: 1px solid black;
    padding: 10px;
}
th{
    background-color: lightgray;
}
</style>
</head>

<body>

<h2>College Management System</h2>

<table>
<tr>
    <th rowspan="2">Department</th>
    <th colspan="2">Student Details</th>
    <th rowspan="2">Faculty Head</th>
</tr>

<tr>
    <th>Boys</th>
    <th>Girls</th>
</tr>

<tr>
    <td>Computer Science</td>
    <td>120</td>
    <td>100</td>
    <td>Dr. Sharma</td>
</tr>

<tr>
    <td>Mechanical</td>
    <td>90</td>
    <td>40</td>
    <td>Dr. Mehta</td>
</tr>

<tr>
    <td>Electrical</td>
    <td>80</td>
    <td>60</td>
    <td>Dr. Patel</td>
</tr>

</table>

</body>
</html>
