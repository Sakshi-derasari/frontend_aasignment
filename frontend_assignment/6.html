<!DOCTYPE html>
<html>
<head>
<title>European Roulette</title>
<style>
body{
    background: green;
    font-family: Arial;
}

table{
    border-collapse: collapse;
    margin: 40px auto;
}

td{
    width: 60px;
    height: 50px;
    text-align: center;
    color: white;
    font-weight: bold;
    border: 2px solid white;
}

.red{
    background: red;
}

.black{
    background: black;
}

.green{
    background: green;
}

.big{
    height:60px;
}

</style>
</head>
<body>

<h2 style="text-align:center;color:white;">European Roulette</h2>

<table>

<tr>
<td class="green" rowspan="5">0</td>
<td class="red">3</td>
<td class="black">6</td>
<td class="red">9</td>
<td class="red">12</td>
<td class="black">15</td>
<td class="red">18</td>
<td class="red">21</td>
<td class="black">24</td>
<td class="red">27</td>
<td class="red">30</td>
<td class="black">33</td>
<td class="red">36</td>
<td class="green">2to1</td>
</tr>

<tr>
<td class="black">2</td>
<td class="red">5</td>
<td class="black">8</td>
<td class="black">11</td>
<td class="red">14</td>
<td class="black">17</td>
<td class="black">20</td>
<td class="red">23</td>
<td class="black">26</td>
<td class="black">29</td>
<td class="red">32</td>
<td class="black">35</td>
<td class="green">2to1</td>
</tr>

<tr>
<td class="red">1</td>
<td class="black">4</td>
<td class="red">7</td>
<td class="black">10</td>
<td class="black">13</td>
<td class="red">16</td>
<td class="red">19</td>
<td class="black">22</td>
<td class="red">25</td>
<td class="black">28</td>
<td class="black">31</td>
<td class="red">34</td>
<td class="green">2to1</td>
</tr>

<tr>
    <td colspan="4">1st12</td>
    <td colspan="4">2nd12</td>
    <td colspan="4">3rd12</td>
    <td rowspan="2"></td>
</tr>

<tr>
<td colspan="2">1 to 18</td>
<td colspan="2">EVEN</td>
<td colspan="2" class="red"></td>
<td colspan="2" class="black"></td>
<td colspan="2">ODD</td>
<td colspan="2">19 to 36</td>
</tr>

</table>

</body>
</html>
