<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        console.log('while loop')
        //to print 1 to 10 =>3 parts of loop: init condition modification
        let i=1;//init
        while(i<=20){//condition
            console.log("i=",i);
            i++;//modifictaion
        }
        //=========
        console.log("for loop");
        for(i=1;i<=10;i++){
            console.log("i=",i);
            
        }
        //==========
        let m=20;
        do{
            console.log("m=",m);
            m++;
        }while(m<=10)
    </script>
</body>
</html>
