<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        console.log("=============================");
        let i, j, k;
        for (i = 1; i <= 5; i++) {
            for (j = 1; j <= 5; j++) {
                document.write('*');
            }
            document.write("<br>");
        }
        document.write("<br>=================================<br>")

        for (i = 1; i <= 5; i++) {
            for (j = 1; j <= i; j++) {
                document.write('*');
            }
            document.write("<br>");
        }
        document.write("<br>=================================<br>")

        for (i = 1; i <= 5; i++) {
            for(k=4;k>=i;k--){
                document.write('-');
            }
            for (j = 1; j <= i; j++) {
                document.write('*');
            }
            document.write("<br>");
        }
        document.write("<br>=================================<br>")



        for (i = 1; i <= 5; i++) {
            for (j = 1; j <= 5; j++) {
                if (i == 1 || i == 5 || j == 1 || j == 5) {
                    document.write('* ');
                }
                else {
                    document.write("# ");
                }
            }
            document.write('<br>');
        }
        document.write("<br>=================================<br>")

    </script>
