<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function promptEx(){
            let num = prompt('enter number');
            let msg = (num > 0)?'positive':'negative';
            alert(msg)
            if(num % 2 == 0){
                alert('num is even')
            }
            else{
                alert('num is odd')
            }
        }
        function findQuad(){
            let x1= prompt('enter x1');
            let x2= prompt('enter x2');

            if (x1 > 0 && x2 > 0){
                alert('first');
            }
            else if (x1 < 0 && x2 > 0){
                alert('second');
            }
            else if (x1 < 0 && x2 < 0){
                alert('third');
            }
            else if (x1 > 0 && x2 < 0){
                alert('forth');
            }
            else{
                alert('center line')
            }
        }
    </script>
</head>
<body>
    <button onclick="findQuad()">findQuad</button>>
</html>
