<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //number datatypes
        let x=100;
        console.log('x=',x);
        console.log(typeof(x));


        //bigint datatypes

    let num=1234567899n;
    console.log("num",num);
    console.log(typeof(num));


    //string datatypes
    let str="sakshi";
    console.log(str);
    console.log(typeof(str));

    //boolean 

    let flag=true;
    console.log("flag",flag);
    console.log(typeof(flag));

    //null
    let status=null;
    console.log("status",status);
    console.log(typeof(status));

    //undefine
    let productName;
    console.log(productName);
    console.log(typeof(productName));

    //object
    let user={
        name:'megha',
        email:'n@test.com'
    }

    console.log(user);
    console.log(typeof(user));
    </script>
</body>
</html>
