
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         #img1{
             height: 100px;
             width: 100px;
             /* transform: rotateY(180deg); */
             animation-name: img1bounce;
             animation-delay: 4s;
             animation-duration: 5s;
             animation-iteration-count: infinite;
             animation-timing-function: ease-in-out
             /* animation-direction: alternate; */
         }
         #img2{
            height: 150px;
             width: 150px;
             animation-name: img1bounce;
             animation-delay: 4s;
             animation-duration: 5s;
             animation-iteration-count: infinite;
             animation-timing-function: ease-in-out
         }
         #img3{
            height: 200px;
             width: 200px;
             animation-name: img1bounce;
             animation-delay: 4s;
             animation-duration: 5s;
             animation-iteration-count: infinite;
             animation-timing-function: ease-in-out
         }

         @keyframes img1bounce {
           
              0%{
                  transform: translateX(0px) rotateY(180deg) ;
              }
             25%{
                transform:  translateX(1100px) rotateY(180deg);
              }
                50%{
                  transform: translateX(1100px) ;
              }
             51%{
                transform:translateX(1100px) rotateY(0deg);
              } 
              100%{
                transform: translateX(0px) rotateY(0deg);
              }
         }

    </style>
</head>
<body>
    <img src="mouse1.jpg" alt="" id="img1">
    <img src="cat1.jpg" alt="" id="img2">
    <img src="dog1.jpg" alt="" id="img3">
</body>
</html>
